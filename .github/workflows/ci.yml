name: CI

on:
  push:
  pull_request:

jobs:
  toolkit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install CLI dependencies
        run: python -m pip install -r requirements-cli.txt
      - name: Run unit tests
        run: python -m unittest
      - name: Validate inventory
        run: bin/ai-research-toolkit validate
      - name: Generate docs
        run: bin/ai-research-toolkit generate
      - name: Ensure generated docs are current
        run: git diff --exit-code
