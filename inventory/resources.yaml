resources:
  - id: d2
    name: D2
    category: software/diagramming
    kind: software
    repo_url: https://github.com/terrastruct/d2.git
    local_path: software/diagramming/d2
    upstream_path: software/diagramming/d2/repo
    priority: core
    install_status: checked
    primary_commands:
      - 'd2 --version'
      - 'd2 input.d2 output.svg'
    outputs:
      - 'SVG'
      - 'PNG'
      - 'PDF'
    license: unknown
    requires_api_key: false
    headless_linux: good
    notes: 通用文本到图示渲染工具，适合把架构图、流程图和系统关系图写成可版本化的 D2 源文件。
  - id: graphviz
    name: Graphviz
    category: software/diagramming
    kind: software
    repo_url: https://gitlab.com/graphviz/graphviz.git
    local_path: software/diagramming/graphviz
    upstream_path: software/diagramming/graphviz/repo
    priority: core
    install_status: checked
    primary_commands:
      - 'dot -V'
      - 'dot -Tsvg input.dot -o output.svg'
    outputs:
      - 'SVG'
      - 'PNG'
      - 'PDF'
    license: unknown
    requires_api_key: false
    headless_linux: good
    notes: 经典 DOT 图渲染工具，适合依赖图、有限状态机、流程图和 diagrams.py 后端渲染。
  - id: mermaid-cli
    name: Mermaid CLI
    category: software/diagramming
    kind: software
    repo_url: https://github.com/mermaid-js/mermaid-cli.git
    local_path: software/diagramming/mermaid-cli
    upstream_path: software/diagramming/mermaid-cli/repo
    priority: core
    install_status: failed
    primary_commands:
      - 'mmdc --version'
      - 'mmdc -i input.mmd -o output.svg'
    outputs:
      - 'SVG'
      - 'PNG'
      - 'PDF'
    license: unknown
    requires_api_key: false
    headless_linux: partial
    notes: Mermaid 图表的命令行渲染器，适合从 Markdown/文档中的流程图、时序图、状态图生成 SVG/PNG/PDF。
